<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Users - Newsly Admin Dashboard</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}">
  <style>
    :root {
      --primary-violet: #570a8c;
      --secondary-blue: #857beb;
      --accent-yellow: #f0d0a7;
      --bg-white: #ffffff;
      --bg-light: #f8f7ff;
      --text-dark: #1a1a1a;
      --text-light: #ffffff;
      --shadow-soft: rgba(80, 49, 128, 0.15);
    }

    /* Reset and base */
    *, *::before, *::after {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg-light);
      color: var(--text-dark);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      transition: background-color 0.3s, color 0.3s;
      min-height: 100vh;
    }
    a {
      text-decoration: none;
      color: inherit;
    }

    body.dark-mode {
      background-color: #1e1e2f;
      color: #ddd;
    }
    body.dark-mode .sidebar {
      background-color: #3a255b;
      color: #ddd;
      box-shadow: none;
    }
    body.dark-mode .sidebar .nav-item:hover,
    body.dark-mode .sidebar .nav-item.active {
      background-color: #4b3478;
      color: var(--accent-yellow);
      box-shadow: none;
    }
    body.dark-mode .sidebar .tooltip {
      background: #4b3478;
    }
    body.dark-mode .main-content {
      background-color: #2a263b;
      color: #ddd;
    }
    body.dark-mode input[type="search"] {
      background-color: #2a263b;
      color: #ddd;
      border-color: #555;
    }
    body.dark-mode input[type="search"]:focus {
      border-color: var(--accent-yellow);
      box-shadow: 0 0 8px var(--accent-yellow);
      outline-color: var(--accent-yellow);
    }
    body.dark-mode .btn-primary {
      background-color: var(--accent-yellow);
      color: #3a255b;
    }
    body.dark-mode .btn-primary:hover,
    body.dark-mode .btn-primary:focus {
      background-color: #d1ba81;
      color: #2f1f47;
      box-shadow: none;
    }
    body.dark-mode #userTable thead {
      background-color: #483e6d;
      color: var(--accent-yellow);
    }
    body.dark-mode #userTable tbody tr:hover {
      background-color: #4b3478;
      color: var(--accent-yellow);
    }
    body.dark-mode .status-badge.active {
      background-color: #71d09c;
      color: #2f4630;
    }
    body.dark-mode .status-badge.suspended {
      background-color: #7f7f7f;
      color: #d4d4d4;
    }
    body.dark-mode .action-btn {
      border-color: var(--accent-yellow);
      color: var(--accent-yellow);
    }
    body.dark-mode .action-btn:hover,
    body.dark-mode .action-btn:focus {
      background-color: var(--accent-yellow);
      color: #3a255b;
      box-shadow: none;
    }
    body.dark-mode .profile-dropdown {
      background-color: #483e6d;
      color: var(--accent-yellow);
    }


    /* Dashboard layout */
    .dashboard {
      display: flex;
      min-height: 100vh;
      overflow: hidden;
    }
    /* Main Content */
    .main-content {
      flex-grow: 1;
      background-color: var(--bg-light);
      padding: 1.3rem 2rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* Top Bar */
    .topbar {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.8rem;
      position: relative;
    }
    .topbar input[type="search"] {
      flex-grow: 1;
      max-width: 420px;
      padding: 10px 15px;
      border-radius: 12px;
      border: 1.5px solid #bbb;
      font-size: 1rem;
      outline-offset: 2px;
      transition: border-color 0.3s ease;
    }
    .topbar input[type="search"]:focus {
      border-color: var(--primary-violet);
      box-shadow: 0 0 12px var(--primary-violet);
      outline: none;
    }

    #themeToggle {
      background: none;
      border: none;
      font-size: 1.8rem;
      cursor: pointer;
      color: var(--primary-violet);
      border-radius: 50%;
      width: 36px;
      height: 36px;
      transition: background-color 0.3s ease, box-shadow 0.3s ease;
    }
    #themeToggle:hover {
      background-color: var(--accent-yellow);
      box-shadow: 0 0 10px var(--accent-yellow);
    }

    /* Profile avatar */
    .profile {
      position: relative;
      cursor: pointer;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid var(--primary-violet);
    }
    .profile img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .profile-dropdown {
      position: absolute;
      right: 0;
      top: calc(100% + 8px);
      background: var(--bg-white);
      border-radius: 12px;
      box-shadow: 0 6px 15px var(--shadow-soft);
      width: 140px;
      list-style-type: none;
      padding: 0.5rem 0;
      margin: 0;
      display: none;
      z-index: 1000;
      user-select: none;
    }
    .profile-dropdown[aria-hidden="false"] {
      display: block;
    }
    .profile-dropdown li a {
      display: block;
      padding: 10px 18px;
      font-weight: 600;
      color: var(--primary-violet);
      text-decoration: none;
      transition: background-color 0.2s ease;
    }
    .profile-dropdown li a:hover,
    .profile-dropdown li a:focus {
      background-color: var(--accent-yellow);
      outline: none;
    }

    /* User Management Section */
    .user-management-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.4rem;
      user-select: none;
    }
    .user-management-header h1 {
      font-size: 1.9rem;
      font-weight: 700;
      color: var(--primary-violet);
    }
    .btn-primary {
      background-color: var(--primary-violet);
      border: none;
      border-radius: 12px;
      padding: 10px 24px;
      font-weight: 700;
      font-size: 1rem;
      color: var(--text-light);
      cursor: pointer;
      box-shadow: 0 4px 14px var(--shadow-soft);
      transition: background-color 0.3s ease, box-shadow 0.3s ease;
    }
    .btn-primary:hover,
    .btn-primary:focus {
      background-color: #3a055a;
      box-shadow: 0 6px 20px var(--primary-violet);
      outline: none;
    }

    /* User Table */
    #userTable {
      width: 100%;
      border-collapse: collapse;
      box-shadow: 0 2px 14px var(--shadow-soft);
      border-radius: 12px;
      overflow: hidden;
    }
    #userTable thead {
      background-color: #f1efff;
      color: var(--primary-violet);
    }
    #userTable th,
    #userTable td {
      padding: 14px 18px;
      border-bottom: 1px solid #e3e1fa;
      text-align: left;
      font-weight: 600;
      font-size: 0.95rem;
    }
    #userTable tbody tr:hover {
      background-color: #e6e2fa;
      color: var(--primary-violet);
      cursor: pointer;
      transition: background-color 0.2s ease;
    }
    .status-badge {
      padding: 4px 12px;
      border-radius: 14px;
      font-weight: 700;
      font-size: 0.85rem;
      white-space: nowrap;
      user-select: none;
      display: inline-block;
    }
    .status-badge.active {
      background-color: #3ac34b;
      color: #fff;
    }
    .status-badge.suspended {
      background-color: #a1a1a1;
      color: #fff;
    }

    /* Action Buttons */
    .action-btn {
      margin-right: 8px;
      background: none;
      border: 1.5px solid var(--primary-violet);
      color: var(--primary-violet);
      border-radius: 12px;
      padding: 5px 12px;
      cursor: pointer;
      font-weight: 700;
      font-size: 0.9rem;
      position: relative;
      overflow: hidden;
      user-select: none;
      transition: background-color 0.3s ease, color 0.3s ease;
    }
    .action-btn:last-child {
      margin-right: 0;
    }
    .action-btn:hover,
    .action-btn:focus {
      background-color: var(--accent-yellow);
      color: var(--primary-violet);
      outline: none;
      box-shadow: 0 0 8px var(--accent-yellow);
    }

    /* Ripple effect */
    .action-btn::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      background-color: var(--accent-yellow);
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      opacity: 0;
      pointer-events: none;
      transform: scale(0);
      transition: transform 0.4s ease, opacity 0.8s ease;
    }
    .action-btn:active::after {
      opacity: 0.4;
      transform: scale(2.5);
      transition: 0s;
    }

    /* Responsive */
    @media (max-width: 960px) {
      .sidebar {
        width: 60px;
      }
      .sidebar.expanded .nav-item .label {
        display: inline;
      }
      .sidebar.collapsed .nav-item .label {
        display: none;
      }
      .main-content {
        padding: 1rem 1rem;
      }
      .user-management-header h1 {
        font-size: 1.5rem;
      }
      #userTable th,
      #userTable td {
        font-size: 0.85rem;
        padding: 10px 12px;
      }
      .action-btn {
        font-size: 0.8rem;
        padding: 4px 8px;
        margin-right: 6px;
      }
    }
  </style>
</head>
<body>
  <div class="dashboard" role="application" aria-label="Newsly Admin Dashboard">
    {% include 'sidebar.html' %}

    <main class="main-content" role="main">
      <header class="topbar">
        <input type="search" id="searchInput" placeholder="Search users…" aria-label="Search users"/>
        <div class="profile" tabindex="0" aria-haspopup="true" aria-expanded="false" aria-label="Profile menu">
          <img src="https://i.pravatar.cc/36" alt="Profile avatar" />
          <ul class="profile-dropdown" role="menu" aria-hidden="true" tabindex="-1">
            <li role="menuitem"><a href="#">Profile</a></li>
            <li role="menuitem"><a href="#">Settings</a></li>
            <li role="menuitem"><a href="#">Logout</a></li>
          </ul>
        </div>
      </header>

      <section class="user-management">
        <div class="user-management-header">
          <h1>👥 User Management</h1>
          <button id="addUserBtn" class="btn-primary" type="button">+ Add User</button>
        </div>

        <table id="userTable" aria-label="User Management Table">
          <thead>
            <tr>
              <th scope="col">Name</th>
              <th scope="col">Email</th>
              <th scope="col">Role</th>
              <th scope="col">Summaries Created</th>
              <th scope="col">Status</th>
              <th scope="col">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr data-status="Active">
              <td>Ananya Sharma</td>
              <td>ananya@newsly.ai</td>
              <td>Editor</td>
              <td>124</td>
              <td><span class="status-badge active">Active</span></td>
              <td>
                <button class="action-btn" aria-label="View Ananya Sharma">View</button>
                <button class="action-btn" aria-label="Edit Ananya Sharma">Edit</button>
                <button class="action-btn" aria-label="Suspend Ananya Sharma">Suspend</button>
              </td>
            </tr>
            <tr data-status="Suspended">
              <td>Rahul Mehta</td>
              <td>rahul@newsly.ai</td>
              <td>Contributor</td>
              <td>89</td>
              <td><span class="status-badge suspended">Suspended</span></td>
              <td>
                <button class="action-btn" aria-label="View Rahul Mehta">View</button>
                <button class="action-btn" aria-label="Edit Rahul Mehta">Edit</button>
                <button class="action-btn" aria-label="Suspend Rahul Mehta">Suspend</button>
              </td>
            </tr>
          </tbody>
        </table>
      </section>
    </main>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const sidebar = document.getElementById('sidebar');
      const sidebarToggle = document.getElementById('sidebarToggle');
      const themeToggle = document.getElementById('themeToggle');
      const profile = document.querySelector('.profile');
      const profileDropdown = profile.querySelector('.profile-dropdown');
      const searchInput = document.getElementById('searchInput');
      const userTableBody = document.querySelector('#userTable tbody');

      // Sidebar toggle
      sidebarToggle.addEventListener('click', () => {
        sidebar.classList.toggle('collapsed');
        sidebar.classList.toggle('expanded');
      });

      // Dark mode toggle
      themeToggle.addEventListener('click', () => {
        document.body.classList.toggle('dark-mode');
        if(document.body.classList.contains('dark-mode')){
          themeToggle.textContent = '☀️';
        } else {
          themeToggle.textContent = '🌓';
        }
      });

      // Profile dropdown toggle
      profile.addEventListener('click', () => {
        const expanded = profile.getAttribute('aria-expanded') === 'true';
        profile.setAttribute('aria-expanded', String(!expanded));
        profileDropdown.setAttribute('aria-hidden', String(expanded));
        if(!expanded) {
          profileDropdown.focus();
        }
      });

      document.addEventListener('click', (e) => {
        if(!profile.contains(e.target)) {
          profile.setAttribute('aria-expanded', 'false');
          profileDropdown.setAttribute('aria-hidden', 'true');
        }
      });

      document.addEventListener('keydown', (e) => {
        if(e.key === 'Escape'){
          profile.setAttribute('aria-expanded', 'false');
          profileDropdown.setAttribute('aria-hidden', 'true');
          profile.focus();
        }
      });

      // Search filter for user table
      searchInput.addEventListener('input', () => {
        const filter = searchInput.value.toLowerCase();
        const rows = userTableBody.querySelectorAll('tr');

        rows.forEach(row => {
          const name = row.children[0].textContent.toLowerCase();
          const email = row.children[1].textContent.toLowerCase();
          if(name.includes(filter) || email.includes(filter)) {
            row.style.display = '';
          } else {
            row.style.display = 'none';
          }
        });
      });

      // Ripple effect for buttons
      document.querySelectorAll('.action-btn, #addUserBtn, #sidebarToggle, #themeToggle').forEach(elem => {
        elem.addEventListener('click', e => {
          const ripple = document.createElement('span');
          ripple.classList.add('ripple');
          ripple.style.left = `${e.offsetX}px`;
          ripple.style.top = `${e.offsetY}px`;
          elem.appendChild(ripple);
          setTimeout(() => ripple.remove(), 600);
        });
      });
    });
  </script>

  <style>
    .ripple {
      position: absolute;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      animation: rippleEffect 0.6s linear;
      pointer-events: none;
      background-color: var(--accent-yellow);
      opacity: 0.4;
      width: 100px;
      height: 100px;
      z-index: 10;
    }

    @keyframes rippleEffect {
      from {
        transform: translate(-50%, -50%) scale(0.1);
        opacity: 0.4;
      }
      to {
        transform: translate(-50%, -50%) scale(1);
        opacity: 0;
      }
    }
  </style>
</body>
</html>
